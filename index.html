<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <img src = "./assets/title.png" id = "title">

    <div id="video-container">
        <video id="video" autoplay></video>
        <div id="flash"></div>
        <button id="snap">
            <img src="./assets/buttons/snap.png" id = "snap-button-img">
        </button>

    </div>

    <div id="photo-editing-container">
        <div id="frame-container">
            <button id= 'sammi' class = 'frame-button'>
                <img src="./assets/buttons/dog.png" class = "frame-button-img">
            </button>
            <button id="gallery" class = 'frame-button'>
                <img src="./assets/buttons/museum.png" class = "frame-button-img">
            </button>

            <button id="goat" class = 'frame-button'>
                <img src="./assets/buttons/celebrity.png" class = "frame-button-img">
            </button>

            <button id="blank" class = 'frame-button'>
                <img src="./assets/buttons/blank.png" class = "frame-button-img">
            </button>


        </div>

        <div id="sticker-container">
            <img src='./assets/stickers/bow.png' , id="bow">
            <img src='./assets/stickers/glitter.png' , id="glitter">
            <img src='./assets/stickers/heart.png' , id="heart">
            <img src='./assets/stickers/star.png' , id="star">
        </div>

        <div id="final-buttons">
            <button id="save" class = 'final-button'>
                 <img src="./assets/buttons/save.png" class = "final-button-img">
            </button>

            <button id="back" class = 'final-button'>
                 <img src="./assets/buttons/back.png" class = "final-button-img">
            </button>
        </div>

        <div id="live-stickers"></div>
    </div>

    

    <script src="photobooth/photostrip.js"></script>
    <script src="photobooth/camera.js"></script>
    <script src="photobooth/sticker.js"></script>
    <script src="photobooth/editor.js"></script>
    <script src="photobooth/photobooth.js"></script>
    <script src="app.js"></script>
</body>


</html>
